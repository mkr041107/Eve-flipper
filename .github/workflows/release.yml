name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-classic:
    name: Build Classic Binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_APP_VERSION: ${{ github.ref_name }}
        run: |
          npm ci
          npm run build

      - name: Cross-compile classic binaries
        env:
          ESI_CLIENT_ID: ${{ secrets.ESI_CLIENT_ID }}
          ESI_CLIENT_SECRET: ${{ secrets.ESI_CLIENT_SECRET }}
          ESI_CALLBACK_URL: ${{ secrets.ESI_CALLBACK_URL }}
        run: |
          if [ -z "${ESI_CLIENT_ID}" ] || [ -z "${ESI_CLIENT_SECRET}" ] || [ -z "${ESI_CALLBACK_URL}" ]; then
            echo "ERROR: ESI_CLIENT_ID / ESI_CLIENT_SECRET / ESI_CALLBACK_URL GitHub Secrets must be set for release builds."
            exit 1
          fi

          VERSION=${GITHUB_REF_NAME}
          LDFLAGS="-s -w -X main.version=${VERSION}"

          if [ -n "${ESI_CLIENT_ID}" ]; then
            LDFLAGS="$LDFLAGS -X main.defaultESIClientID=${ESI_CLIENT_ID}"
          fi
          if [ -n "${ESI_CLIENT_SECRET}" ]; then
            LDFLAGS="$LDFLAGS -X main.defaultESIClientSecret=${ESI_CLIENT_SECRET}"
          fi
          if [ -n "${ESI_CALLBACK_URL}" ]; then
            LDFLAGS="$LDFLAGS -X main.defaultESICallbackURL=${ESI_CALLBACK_URL}"
          fi

          for target in \
            "windows amd64 .exe" \
            "linux amd64 " \
            "linux arm64 " \
            "darwin amd64 " \
            "darwin arm64 "; do
            set -- $target
            echo "Building classic $1/$2..."
            GOOS=$1 GOARCH=$2 CGO_ENABLED=0 \
              go build -ldflags "${LDFLAGS}" -o "eve-flipper-$1-$2$3" .
          done

      - name: Upload classic artifacts
        uses: actions/upload-artifact@v4
        with:
          name: classic-binaries
          path: |
            eve-flipper-windows-amd64.exe
            eve-flipper-linux-amd64
            eve-flipper-linux-arm64
            eve-flipper-darwin-amd64
            eve-flipper-darwin-arm64
          if-no-files-found: error

  build-wails:
    name: Build Wails (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest
            goos: windows
            goarch: amd64
            ext: .exe
            cgo: "0"
            windows_gui: "1"
          - runner: ubuntu-22.04
            goos: linux
            goarch: amd64
            ext: ""
            cgo: "1"
            windows_gui: "0"
          - runner: macos-14
            goos: darwin
            goarch: arm64
            ext: ""
            cgo: "1"
            windows_gui: "0"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Linux Wails dependencies
        if: matrix.goos == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libgtk-3-dev libwebkit2gtk-4.0-dev libsoup2.4-dev

      - name: Build frontend for Wails
        working-directory: frontend
        env:
          VITE_APP_VERSION: ${{ github.ref_name }}
        run: |
          npm ci
          npm run build:wails

      - name: Build Wails binary
        shell: bash
        env:
          ESI_CLIENT_ID: ${{ secrets.ESI_CLIENT_ID }}
          ESI_CLIENT_SECRET: ${{ secrets.ESI_CLIENT_SECRET }}
          ESI_CALLBACK_URL: ${{ secrets.ESI_CALLBACK_URL }}
        run: |
          VERSION=${GITHUB_REF_NAME}
          LDFLAGS="-s -w -X main.version=${VERSION}"
          if [ "${{ matrix.windows_gui }}" = "1" ]; then
            LDFLAGS="-s -w -H=windowsgui -X main.version=${VERSION}"
          fi

          if [ -n "${ESI_CLIENT_ID}" ]; then
            LDFLAGS="$LDFLAGS -X main.defaultESIClientID=${ESI_CLIENT_ID}"
          fi
          if [ -n "${ESI_CLIENT_SECRET}" ]; then
            LDFLAGS="$LDFLAGS -X main.defaultESIClientSecret=${ESI_CLIENT_SECRET}"
          fi
          if [ -n "${ESI_CALLBACK_URL}" ]; then
            LDFLAGS="$LDFLAGS -X main.defaultESICallbackURL=${ESI_CALLBACK_URL}"
          fi

          OUT="eve-flipper-wails-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}"
          echo "Building Wails ${OUT}..."

          if [ "${{ matrix.goos }}" = "darwin" ]; then
            export MACOSX_DEPLOYMENT_TARGET=11.0
            export CGO_LDFLAGS="${CGO_LDFLAGS} -framework UniformTypeIdentifiers"
          fi

          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} CGO_ENABLED=${{ matrix.cgo }} \
            go build -tags "wails,production" -ldflags "${LDFLAGS}" -o "${OUT}" .

      - name: Upload Wails artifact
        uses: actions/upload-artifact@v4
        with:
          name: wails-${{ matrix.goos }}-${{ matrix.goarch }}
          path: eve-flipper-wails-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-classic
      - build-wails
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: List release assets
        run: ls -lah release-assets

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release-assets/eve-flipper-*
          draft: ${{ contains(github.ref_name, '-rc') }}
          prerelease: ${{ contains(github.ref_name, '-rc') }}
